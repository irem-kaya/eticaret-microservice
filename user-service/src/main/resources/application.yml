server:
  port: 8081

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://localhost:5433/product_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: eticaret
    password: eticaret123

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/Eticaret

  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  rabbitmq:
    exchange: eticaret.exchange
    queue:
      user: user.queue
      log: log.queue
    routing-key:
      user-registered: user.registered
      log: log.routing.key
  keycloak:
    server-url: http://localhost:8180
    realm: Eticaret
    client-id: admin-cli
    username: admin
    password: admin123

  logging:
    level:
      com.eticaret: DEBUG
      org.keycloak: DEBUG
      root: INFO