server:
  port: 8085

spring:
  application:
    name: payment-service

  datasource:
    url: jdbc:postgresql://localhost:5433/product_db
    username: postgres
    password: postgres123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: eticaret
    password: eticaret123

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/eticaret

  threads:
    virtual:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  rabbitmq:
    exchange: eticaret.exchange
    queue:
      payment: payment.queue
      log: log.queue
    routing-key:
      payment-completed: payment.completed
      payment-failed: payment.failed
      log: log.routing.key
  payment:
    provider: iyzico
    iyzico:
      api-key: sandbox-YTlIeGlQeWQ2OVBpY1ZlYg==
      secret-key: sandbox-rZfOpYtkUNaAa8gMEBovkdw2UsQg==
      base-url: https://sandbox-api.iyzipay.com