server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=0

        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/products/**,/api/categories/**
          filters:
            - StripPrefix=0

        - id: cart-service
          uri: http://localhost:8089       # ✅ düzeltildi (8083→8089)
          predicates:
            - Path=/api/cart/**
          filters:
            - StripPrefix=0

        - id: order-service
          uri: http://localhost:8084       # ✅ doğru
          predicates:
            - Path=/api/orders/**
          filters:
            - StripPrefix=0

        - id: payment-service
          uri: http://localhost:8085       # ✅ doğru
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=0

        - id: notification-service
          uri: http://localhost:8086       # ✅ doğru
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=0

        - id: ai-service
          uri: http://localhost:8087       # ✅ doğru
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=0

        - id: recommendation-service
          uri: http://localhost:8088       # ✅ doğru
          predicates:
            - Path=/api/recommendations/**
          filters:
            - StripPrefix=0

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true



  threads:
    virtual:
      enabled: true

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO