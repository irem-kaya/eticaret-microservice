name: CI/CD Pipeline - E-Ticaret Microservice

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/eticaret
  AWS_REGION: eu-west-1

jobs:
  # ── 1. Code Quality & Build ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: product_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: JDK ${{ env.JAVA_VERSION }} Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Maven Clean Install
        run: mvn clean install -DskipTests -q

      - name: Common Module Test
        run: mvn -pl common test -q

      - name: Product Service Test
        run: mvn -pl product-service-main test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db
          SPRING_RABBITMQ_HOST: localhost

      - name: Cart Service Test
        run: mvn -pl cart-service test -q
        env:
          SPRING_RABBITMQ_HOST: localhost

      - name: Order Service Test
        run: mvn -pl order-service test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db
          SPRING_RABBITMQ_HOST: localhost

      - name: Payment Service Test
        run: mvn -pl payment-service test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db
          SPRING_RABBITMQ_HOST: localhost

      - name: User Service Test
        run: mvn -pl user-service test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db

      - name: AI Service Test
        run: mvn -pl ai-service test -q
        continue-on-error: true

      - name: Notification Service Test
        run: mvn -pl notification-service test -q
        continue-on-error: true

      - name: Test Sonuçlarını Yükle
        uses: actions/upload-artifact@v4
        if: always()
        with:
            name: test-results
            path: |
              **/target/surefire-reports/
              **/target/failsafe-reports/
            if-no-files-found: warn
            retention-days: 10


      - name: Slack — Build Başarılı
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ *Build & Test Başarılı!*",
              "attachments": [{
                "color": "#4CAF50",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Tetikleyen", "value": "${{ github.actor }}", "short": true },
                  { "title": "Commit", "value": "${{ github.event.head_commit.message }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Slack — Build Başarısız
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ *Build & Test Başarısız!*",
              "attachments": [{
                "color": "#F44336",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Tetikleyen", "value": "${{ github.actor }}", "short": true },
                  { "title": "Log", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ── 2. Frontend Build ────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Bağımlılıkları Yükle
        run: cd frontend && npm ci

      - name: ESLint Kontrolü
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Frontend Build
        run: cd frontend && npm run build

      - name: Build Çıktısını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

      - name: Slack — Frontend Build Başarısız
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ *Frontend Build Başarısız!*",
              "attachments": [{
                "color": "#F44336",
                "fields": [
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Tetikleyen", "value": "${{ github.actor }}", "short": true },
                  { "title": "Log", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

