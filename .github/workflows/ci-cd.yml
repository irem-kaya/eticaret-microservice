name: CI/CD Pipeline - E-Ticaret Microservice

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  JAVA_VERSION: '21'
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/eticaret
  AWS_REGION: eu-west-1

jobs:
  # ── 1. Code Quality & Build ──────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: product_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: JDK ${{ env.JAVA_VERSION }} Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Maven Clean Install
        run: mvn clean install -DskipTests -q

      - name: Common Module Test
        run: mvn -pl common test -q

      - name: Product Service Test
        run: mvn -pl product-service-main test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db
          SPRING_RABBITMQ_HOST: localhost

      - name: Cart Service Test
        run: mvn -pl cart-service test -q
        env:
          SPRING_RABBITMQ_HOST: localhost

      - name: Order Service Test
        run: mvn -pl order-service test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db
          SPRING_RABBITMQ_HOST: localhost

      - name: Payment Service Test
        run: mvn -pl payment-service test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db
          SPRING_RABBITMQ_HOST: localhost

      - name: User Service Test
        run: mvn -pl user-service test -q
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/product_db

      - name: AI Service Test
        run: mvn -pl ai-service test -q
        continue-on-error: true

      - name: Notification Service Test
        run: mvn -pl notification-service test -q
        continue-on-error: true

      - name: Test Sonuçlarını Yükle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/target/surefire-reports/'
          retention-days: 10

  # ── 2. Frontend Build ────────────────────────────────────────────────────────────
  build-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Bağımlılıkları Yükle
        run: cd frontend && npm ci

      - name: ESLint Kontrolü
        run: cd frontend && npm run lint
        continue-on-error: true

      - name: Frontend Build
        run: cd frontend && npm run build

      - name: Build Çıktısını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist/
          retention-days: 7

  # ── 3. Docker Image Build (Backend) ──────────────────────────────────────────────
  docker-build-backend:
    name: Docker Build Backend
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    strategy:
      matrix:
        service:
          - product-service-main
          - cart-service
          - order-service
          - payment-service
          - user-service
          - notification-service
          - ai-service
          - api-gateway
      max-parallel: 2

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: JDK ${{ env.JAVA_VERSION }} Kurulumu
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Common Module Build
        run: mvn -pl common install -DskipTests -q

      - name: Jib ile Docker Image Build
        run: |
          mvn -pl ${{ matrix.service }} compile jib:dockerBuild \
            -Djib.to.image=${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }} \
            -Djib.to.tags=latest,v${{ github.ref_name }} \
            -DskipTests -q

      - name: GHCR'a Giriş
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Docker Image Push
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ── 4. Docker Image Build (Frontend) ─────────────────────────────────────────────
  docker-build-frontend:
    name: Docker Build Frontend
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: Artifacts İndir
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist

      - name: GHCR'a Giriş
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Docker Image Build & Push
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest

  # ── 5. AWS Elastic Beanstalk Deploy (API Gateway + Services) ──────────────────────
  deploy-aws:
    name: AWS Deploy
    runs-on: ubuntu-latest
    needs: [docker-build-backend, docker-build-frontend]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: http://13.50.239.68

    steps:
      - name: Checkout Kodu
        uses: actions/checkout@v4

      - name: AWS Kimlik Bilgilerini Ayarla
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: EC2'ye Deploy Script Kopyala
        run: |
          # API Gateway Deploy
          aws ssm send-command \
            --document-name "AWS-RunShellScript" \
            --instance-ids "i-xxxxxxxx" \
            --parameters 'commands=[
              "cd /opt/eticaret",
              "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}",
              "docker stop eticaret-api-gateway || true",
              "docker rm eticaret-api-gateway || true",
              "docker run -d --name eticaret-api-gateway -p 8080:8080 \\
                -e SPRING_DATASOURCE_URL=${{ secrets.DB_URL }} \\
                -e SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USER }} \\
                -e SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }} \\
                ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ github.sha }}"
            ]'

      - name: Healthcheck Kontrol Et
        run: |
          sleep 30
          for i in {1..10}; do
            if curl -f http://13.50.239.68:8080/actuator/health; then
              echo "✅ API Gateway Sağlık Durumu: OK"
              break
            fi
            echo "⏳ Deneme $i/10..."
            sleep 10
          done

  # ── 6. Slack Notification ────────────────────────────────────────────────────────
  notify-slack:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build-backend, docker-build-frontend]
    if: always()

    steps:
      - name: Build Başarıyla Tamamlandı
        if: needs.build-and-test.result == 'success' && needs.docker-build-backend.result == 'success'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *E-Ticaret CI/CD Başarılı*",
              "attachments": [{
                "color": "36a64f",
                "title": "${{ github.repository }} - ${{ github.ref_name }}",
                "title_link": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "fields": [
                  {
                    "title": "Event",
                    "value": "${{ github.event_name }}",
                    "short": true
                  },
                  {
                    "title": "Commit",
                    "value": "${{ github.sha }}",
                    "short": true
                  },
                  {
                    "title": "Author",
                    "value": "${{ github.actor }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Build Status",
                    "value": "✅ Passed",
                    "short": false
                  }
                ],
                "footer": "E-Ticaret Microservice Pipeline"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Build Başarısız Oldu
        if: needs.build-and-test.result == 'failure' || needs.docker-build-backend.result == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *E-Ticaret CI/CD Başarısız*",
              "attachments": [{
                "color": "d72828",
                "title": "${{ github.repository }} - ${{ github.ref_name }}",
                "title_link": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                "fields": [
                  {
                    "title": "Event",
                    "value": "${{ github.event_name }}",
                    "short": true
                  },
                  {
                    "title": "Author",
                    "value": "${{ github.actor }}",
                    "short": true
                  },
                  {
                    "title": "Branch",
                    "value": "${{ github.ref_name }}",
                    "short": true
                  },
                  {
                    "title": "Build Status",
                    "value": "❌ Failed",
                    "short": false
                  }
                ],
                "footer": "E-Ticaret Microservice Pipeline"
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}



